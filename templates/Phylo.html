<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz phylogénétique</title>
</head>

<body>

    <h1>Tirage d'espèces</h1>

    <p>Nombre d'espèces à tirer :</p>

    <select id="selectTirage">
        <option value="4">4 espèces</option>
        <option value="6">6 espèces</option>
        <option value="8">8 espèces</option>
        <option value="10" selected>10 espèces</option>
        <option value="12">12 espèces</option>
        <option value="15">15 espèces</option>
        <option value="20">20 espèces</option>
    </select>

    <br><br>

    <h3>Tirage simple</h3>

    <p>Groupes d'espèces :</p>

    <select id="selectGroupes" multiple size="8">
        <option value="Marsupiaux">Marsupiaux</option>
        <option value="Mammifères">Mammifères</option>
        <option value="Oiseaux">Oiseaux</option>
        <option value="Reptiles">Reptiles</option>
        <option value="Poisson">Poisson</option>
        <option value="Invertébrés">Invertébrés</option>
        <option value="Plantes">Plantes</option>
        <option value="Champignons">Champignons</option>
    </select>

    <br><br>

    <button onclick="lancerTirage()">
        Tirer les espèces
    </button>

    <hr>

    <h3>Double tirage</h3>

    <label>Groupe 1 :</label>

    <select id="groupe1">
        <option value="Marsupiaux">Marsupiaux</option>
        <option value="Mammifères">Mammifères</option>
        <option value="Oiseaux">Oiseaux</option>
        <option value="Reptiles">Reptiles</option>
        <option value="Poisson">Poisson</option>
        <option value="Invertébrés">Invertébrés</option>
        <option value="Plantes">Plantes</option>
        <option value="Champignons">Champignons</option>
    </select>

    <br><br>

    <label>Groupe 2 :</label>

    <select id="groupe2">
        <option value="Marsupiaux">Marsupiaux</option>
        <option value="Mammifères">Mammifères</option>
        <option value="Oiseaux">Oiseaux</option>
        <option value="Reptiles">Reptiles</option>
        <option value="Poisson">Poisson</option>
        <option value="Invertébrés">Invertébrés</option>
        <option value="Plantes">Plantes</option>
        <option value="Champignons">Champignons</option>
    </select>

    <br><br>

    <button onclick="lancerTirageDouble()">
        Lancer le double tirage
    </button>

    <hr>

    <h2>Arbre phylogénétique</h2>

    <div id="tree-container"
         style="width:100%;text-align:center;">
    </div>

    <hr>

    <h2>Espèces tirées</h2>

    <div id="resultats"></div>

    <button id="btnDownload" style="display:none;">
        Télécharger les TaxIDs
    </button>

    <hr>

    <h3>Associer chaque numéro à une espèce</h3>

    <div id="quiz"></div>

    <br>

    <button id="btnCorrection">
        Corriger
    </button>

    <div id="score"></div>

    <br>

    <button id="btnSolution">
        Voir la solution
    </button>

    <div id="solution"></div>

    <script src="/static/script_phylo.js"></script>

    <script src="https://cdn.jsdelivr.net/gh/SmitsP/phyloCanvas/jsphylosvg-min.js"></script>
    
    <button
    id="btnDownload"
    style="display:none;">
    Télécharger

    </button>
</body>

</html>
