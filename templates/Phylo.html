<!DOCTYPE html>
<html lang="fr">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>Quiz phylogénétique</title>

    <link
        rel="stylesheet"
        href="/static/css.css">

</head>

<body>

    <h1>Quiz phylogénétique</h1>

    <!-- ========================= -->
    <!-- Configuration -->
    <!-- ========================= -->

    <div id="zoneConfiguration">

        <div class="config">

            <div class="bloc">

                <h3>Tirage simple</h3>

                <p>Nombre d'espèces :</p>

                <select id="selectTirage">

                    <option value="4">4 espèces</option>
                    <option value="6">6 espèces</option>
                    <option value="8">8 espèces</option>
                    <option value="10" selected>10 espèces</option>
                    <option value="12">12 espèces</option>
                    <option value="15">15 espèces</option>
                    <option value="20">20 espèces</option>

                </select>

                <br><br>

                <p>Groupes :</p>

                <div id="groupCheckboxes" class="group-checkboxes">
                    <label><input type="checkbox" name="groupes" value="Marsupiaux"> Marsupiaux</label>
                    <label><input type="checkbox" name="groupes" value="Mammifères"> Mammifères</label>
                    <label><input type="checkbox" name="groupes" value="Oiseaux"> Oiseaux</label>
                    <label><input type="checkbox" name="groupes" value="Reptiles"> Reptiles</label>
                    <label><input type="checkbox" name="groupes" value="Poisson"> Poisson</label>
                    <label><input type="checkbox" name="groupes" value="Invertébrés"> Invertébrés</label>
                    <label><input type="checkbox" name="groupes" value="Plantes"> Plantes</label>
                    <label><input type="checkbox" name="groupes" value="Champignons"> Champignons</label>
                </div>

                <br>
                <small>Cochez un ou plusieurs groupes puis lancez le tirage.</small>

                <fieldset style="margin-top:16px; text-align:left; width:100%;">
                    <legend>Niveau de difficulté :</legend>
                    <label><input type="radio" name="difficulte" value="facile" checked> Facile (affiche Règne / Classe / Ordre)</label><br>
                    <label><input type="radio" name="difficulte" value="difficile"> Difficile (masque les détails)</label>
                </fieldset>

                <br>

                <button onclick="lancerTirage()">
                    Tirage simple
                </button>

            </div>


        </div>

    </div>

    <!-- ========================= -->
<!-- Actions -->
<!-- ========================= -->

<div class="actions">
    <button id="btnCorrection" style="display:none;">
        Corriger
    </button>

    <button id="btnSolution" style="display:none;">
        Voir la solution
    </button>

    <button
        id="btnDownload"
        style="display:none;">

        Télécharger les TaxIDs

    </button>

    <button
        id="btnNouvellePartie"
        style="display:none;">

        Nouvelle partie

    </button>

</div>
    <!-- ========================= -->
    <!-- Zone de jeu -->
    <!-- ========================= -->

    <div class="jeu">

    <!-- Arbre -->

    <div class="colonne-arbre">

        <h2>Arbre phylogénétique</h2>

        <div id="tree-container"></div>

    </div>

    <!-- Quiz -->

    <div class="colonne-quiz">

        <h2>Quiz</h2>

</div>

        <div id="quiz"></div>

    </div>

    <div class="actions-bottom">
        <button id="btnTestLineaire" class="test-mode" onclick="lancerTestLineaire()">
            Test arbre linéaire
        </button>
    </div>
</div>

    <!-- ========================= -->
    <!-- Score -->
    <!-- ========================= -->

    <div id="score"></div>

    <!-- ========================= -->
    <!-- Solution -->
    <!-- ========================= -->

    <div id="solution"></div>

    <!-- ========================= -->
    <!-- Résultats techniques -->
    <!-- ========================= -->

    <div id="resultats"></div>

    <script src="/static/script_phylo.js"></script>

</body>

</html>
